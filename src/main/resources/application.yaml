server:
  port: 8080

spring:
  application:
    name: order-processing-system
  datasource:
    url: jdbc:postgresql://localhost:5432/order_database
    username: twinkal
    password:

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always